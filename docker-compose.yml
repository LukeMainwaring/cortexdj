services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: cortexdj
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cortexdj

  backend:
    build:
      context: ./backend
      target: local
    ports:
      - "8003:8003"
    environment:
      ENVIRONMENT: development
      UVICORN_PORT: 8003
      POSTGRES_DB: cortexdj
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    env_file:
      - .env
    volumes:
      - ./backend/src:/app/src
      - ./backend/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cortexdj

networks:
  cortexdj:
    attachable: true

volumes:
  postgres_data:
