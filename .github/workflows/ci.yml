name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pre-commit
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-3|${{ steps.setup-python.outputs.python-version }}|${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit (lint + format)
        env:
          SKIP: mypy
        run: |
          pip install pre-commit
          pre-commit run --all-files

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: ./backend
        run: uv sync --frozen --no-install-project --all-groups

      - name: Run mypy
        working-directory: ./backend
        run: uv run mypy --strict src tests

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      # Same image as local docker compose; backs the integration tier.
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cortexdj_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # The integration tier connects to the service container above and
      # refuses to run unless the DB name contains "test" (it runs alembic
      # upgrade/downgrade). The unit tier stays DB-free.
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cortexdj_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      # Dummy provider key: tests use TestModel/monkeypatch, never a real call.
      OPENAI_API_KEY: sk-test-deterministic-no-real-calls
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: ./backend
        run: uv sync --frozen --all-groups

      - name: Run tests + coverage
        working-directory: ./backend
        # Coverage floor at 40% (baseline ~43%); ratchet up as coverage grows.
        # The explicit -m "not eval" OVERRIDES addopts' 'not integration'
        # (the last -m wins), which is what selects the integration tier
        # here — don't remove it as "redundant" or the tier silently
        # deselects while CI stays green.
        run: uv run pytest -m "not eval" --cov=cortexdj --cov-report=term-missing --cov-report=xml --cov-fail-under=40

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          package_json_file: frontend/package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm -C frontend install --frozen-lockfile

      - name: Lint
        run: pnpm -C frontend lint
